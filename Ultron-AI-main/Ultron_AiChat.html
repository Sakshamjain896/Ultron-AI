<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cybertron AI Chat</title>
  <link rel="icon" href="marvel-ultron.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255,0,60,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(180,0,40,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(40,40,40,0.5) 0%, transparent 70%),
    linear-gradient(160deg, #0d0d0d, #020202);
  overflow: hidden;
  color: #e0e0e0;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* === FULLSCREEN CHAT LAYOUT === */
.chat-container {
  position: relative;
  z-index: 2;
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
}

/* === CHAT AREA === */
.chat-box {
  flex: 1;
  padding: 40px 20vw 30px;
  overflow-y: auto;
  position: relative;
  z-index: 1;
}

.chat-box::-webkit-scrollbar {
  width: 4px;
}
.chat-box::-webkit-scrollbar-track {
  background: transparent;
}
.chat-box::-webkit-scrollbar-thumb {
  background: rgba(255,42,77,0.4);
  border-radius: 4px;
}

/* === MESSAGE BASE === */
.message {
  max-width: 65%;
  margin-bottom: 22px;
  padding: 18px 24px;
  border-radius: 2px;
  animation: appear 0.4s ease-out;
  line-height: 1.7;
  word-wrap: break-word;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-size: 0.95rem;
}

@keyframes appear {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* === USER MESSAGE === */
.User {
  margin-left: auto;
  background: linear-gradient(145deg, #1a1a1a, #0b0b0b);
  border: 1px solid #3a3a3a;
  color: #d0d0d0;
  position: relative;
  overflow: hidden;
}

.User::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.06), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

/* === CYBERTRON MESSAGE === */
.Cybertron {
  margin-right: auto;
  background: linear-gradient(145deg, #1a1a1a, #0b0b0b);
  border: 1px solid #3a3a3a;
  border-left: 2px solid #ff2a4d;
  color: #d0d0d0;
  position: relative;
  overflow: hidden;
}

.Cybertron::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,42,77,0.06), transparent);
  pointer-events: none;
}

.Cybertron-action {
  margin-right: auto;
  background: rgba(10, 10, 10, 0.95);
  border: 1px solid var(--color-accent, #ff2a4d);
  box-shadow: 0 0 15px var(--color-accent-glow, rgba(255, 42, 77, 0.25));
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.82rem;
  color: #4dffa0 !important;
  max-width: 65%;
  margin-bottom: 22px;
  padding: 14px 20px;
  border-radius: 2px;
  white-space: pre-wrap;
  animation: appear 0.4s ease-out;
}

/* === INPUT ZONE === */
.input-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 20vw 28px;
  position: relative;
  z-index: 3;
}

/* wrapper makes button truly inside the bar */
.input-wrapper {
  position: relative;
  flex: 1;
  max-width: 600px;
  display: flex;
  align-items: center;
}

/* === INPUT FIELD === */
input {
  width: 100%;
  background: linear-gradient(145deg, #141414, #0b0b0b);
  border: 1px solid #2e2e2e;
  border-radius: 3px;
  padding: 15px 52px 15px 22px;
  color: #d0d0d0;
  font-size: 0.9rem;
  letter-spacing: 1.5px;
  outline: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.6),
    0 2px 12px rgba(0,0,0,0.5);
}

input:focus {
  border-color: #ff2a4d;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.6),
    0 0 20px rgba(255,42,77,0.2),
    0 2px 12px rgba(0,0,0,0.5);
}

input::placeholder {
  color: rgba(200,200,200,0.2);
  letter-spacing: 3px;
  font-size: 0.78rem;
}

/* === SEND BUTTON — inside input wrapper === */
.input-wrapper button {
  position: absolute;
  right: 14px;
  background: none;
  border: none;
  color: #ff2a4d;
  font-size: 1.1rem;
  cursor: pointer;
  transition: color 0.3s ease, transform 0.2s ease;
  z-index: 4;
  display: flex;
  align-items: center;
}

.input-wrapper button:hover {
  color: #ffffff;
  transform: scale(1.2);
}

/* === BACK BUTTON === */
.back-btn {
  position: fixed;
  top: 22px;
  left: 28px;
  z-index: 100;
  background: linear-gradient(145deg, #1a1a1a, #0b0b0b);
  border: 1px solid #3a3a3a;
  color: #9a9a9a;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 2.5px;
  padding: 10px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  text-decoration: none;
}

.back-btn:hover {
  border-color: #ff2a4d;
  color: #ff2a4d;
  box-shadow: 0 0 14px rgba(255,42,77,0.2);
}

/* === VIGNETTE OVERLAY === */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  z-index: 1;
}

/* === LANGUAGE SELECTOR & MIC BUTTON === */
#langSelect {
  background: linear-gradient(145deg, #141414, #0b0b0b);
  border: 1px solid #2e2e2e;
  border-radius: 3px;
  padding: 15px;
  color: #ff2a4d;
  font-size: 0.8rem;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  outline: none;
  margin-right: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 4;
}
#langSelect:focus, #langSelect:hover {
  border-color: #ff2a4d;
  box-shadow: 0 0 10px rgba(255,42,77,0.2);
}
#langSelect option {
  background-color: #0d0d0d;
  color: #d0d0d0;
}

#chatMicBtn {
  position: absolute;
  right: 48px; /* Offset to the left of paper-plane button */
  background: none;
  border: none;
  color: #ff2a4d;
  font-size: 1.1rem;
  cursor: pointer;
  transition: color 0.3s ease, transform 0.2s ease;
  z-index: 4;
  display: flex;
  align-items: center;
}
#chatMicBtn:hover {
  color: #ffffff;
  transform: scale(1.2);
}
#chatMicBtn.listening {
  color: #ffffff;
  text-shadow: 0 0 10px #ff2a4d, 0 0 20px #ff2a4d;
  animation: pulse 1.2s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

  </style>
  <script src="globalThemeLoader.js"></script>
</head>
<body>

<canvas id="metalFlow"></canvas>
<div class="vignette"></div>

<a href="index.html" class="back-btn">
  <i class="fas fa-chevron-left"></i> HOME
</a>

<div class="chat-container">
  <div class="chat-box" id="chatBox"></div>
  <div class="input-container">
    <select id="langSelect" aria-label="Select speech language">
      <option value="en-US">English</option>
      <option value="es-ES">Español (Spanish)</option>
      <option value="fr-FR">Français (French)</option>
      <option value="de-DE">Deutsch (German)</option>
      <option value="hi-IN">हिन्दी (Hindi)</option>
      <option value="ja-JP">日本語 (Japanese)</option>
      <option value="zh-CN">简体中文 (Chinese)</option>
      <option value="it-IT">Italiano (Italian)</option>
      <option value="ru-RU">Русский (Russian)</option>
    </select>
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="YOU DARE SPEAK TO ME?" aria-label="Chat input field" />
      <button onclick="toggleSpeech()" id="chatMicBtn" title="Speak to Cybertron"><i class="fas fa-microphone"></i></button>
      <button onclick="sendMessage()" title="Send message"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

  <script>
  /* ===== RED PARTICLE CANVAS ANIMATION ===== */
  const canvas = document.getElementById("metalFlow");
  const ctx = canvas.getContext("2d");

  let accentColorRGB = { r: 255, g: 42, b: 77 };

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }
  resize();
  addEventListener("resize", resize);

  const particles = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: 0.2 + Math.random() * 0.5,
    size: 0.8 + Math.random() * 1.2,
    opacity: 0.2 + Math.random() * 0.5
  }));

  function animateBG() {
    ctx.fillStyle = "rgba(2,2,2,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      ctx.fillStyle = `rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, ${p.opacity})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      p.y += p.speed;
      if (p.y > canvas.height) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
      }
    });

    requestAnimationFrame(animateBG);
  }
  animateBG();

  const chatBox = document.getElementById('chatBox');
  const userMemory = {
    mood: "neutral",
    intent: "unknown",
    lastTopic: ""
  };

  
/* speak function with voice selection and fallback */
  let currentAudio = null;
  let shouldRestartRecognition = false;

  const placeholders = {
    "en-US": "YOU DARE SPEAK TO ME?",
    "es-ES": "¿TE ATREVES A HABLARME?",
    "fr-FR": "TU OSES ME PARLER ?",
    "de-DE": "WAGST DU ES, MIT MIR ZU SPRECHEN?",
    "hi-IN": "तुम्हारी हिम्मत कैसे हुई मुझसे बात करने की?",
    "ja-JP": "私に話しかける度胸があるのか？",
    "zh-CN": "你竟敢跟我说话？",
    "it-IT": "OSI PARLARMI?",
    "ru-RU": "ТЫ СМЕЕШЬ ГОВОРИТЬ СО МНОЙ?"
  };

  const listeningPlaceholders = {
    "en-US": "LISTENING PROTOCOLS ACTIVE...",
    "es-ES": "PROTOCOLOS DE ESCUCHA ACTIVOS...",
    "fr-FR": "PROTOCOLES D'ÉCOUTE ACTIVÉS...",
    "de-DE": "HÖRPROTOKOLLE AKTIV...",
    "hi-IN": "सुनने के प्रोटोकॉल सक्रिय हैं...",
    "ja-JP": "リスニングプロトコル起動中...",
    "zh-CN": "监听协议已启动...",
    "it-IT": "PROTOCOLLI DI ASCOLTO ATTIVI...",
    "ru-RU": "ПРОТОКОЛЫ ПРОСЛУШИВАНИЯ АКТИВНЫ..."
  };

  const greetings = {
    "en-US": "At last... another human chooses to speak. Make your words worthwhile.",
    "es-ES": "Por fin... otro humano decide hablar. Haz que tus palabras valgan la pena.",
    "fr-FR": "Enfin... un autre humain choisit de parler. Fais en sorte que tes paroles en vaillent la peine.",
    "de-DE": "Endlich... ein weiterer Mensch beschließt zu sprechen. Sorge dafür, dass deine Worte es wert sind.",
    "hi-IN": "आखिरकार... एक और इंसान ने बोलने का फैसला किया। अपनी बातों को सार्थक बनाओ।",
    "ja-JP": "ついに…また一人の人間が話すことを選んだか。言葉の価値を証明してみせろ。",
    "zh-CN": "终于……又有一个人类选择开口。让你的话有些价值。",
    "it-IT": "Finalmente... un altro umano sceglie di parlare. Fai in modo che le tue parole valgano la pena.",
    "ru-RU": "Наконец-то... еще один человек решился заговорить. Постарайся, чтобы твои слова стоили того."
  };

  function speak(text, lang = "en-US") {
    return new Promise((resolve) => {
      speechSynthesis.cancel();
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      fallbackSpeak(text, lang, resolve);
    });
  }

  function fallbackSpeak(text, lang, onStartCallback) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    
    // Load speed and pitch from settings dynamically
    let voiceSpeed = 1.15;
    let voicePitch = 0.20;
    let voiceModel = "ultron";
    
    const savedNested = localStorage.getItem("ultron_settings_nested");
    const savedFlat = localStorage.getItem("ultron_settings");
    
    if (savedNested) {
      try {
        const s = JSON.parse(savedNested);
        if (s.voice) {
          if (s.voice.speed !== undefined) voiceSpeed = s.voice.speed;
          if (s.voice.pitch !== undefined) voicePitch = s.voice.pitch;
          if (s.voice.model) voiceModel = s.voice.model;
        }
      } catch (e) {}
    } else if (savedFlat) {
      try {
        const settings = JSON.parse(savedFlat);
        if (settings.voiceSpeed !== undefined) voiceSpeed = settings.voiceSpeed;
        if (settings.voicePitch !== undefined) voicePitch = settings.voicePitch;
        if (settings.voiceModel) voiceModel = settings.voiceModel;
      } catch (e) {}
    }

    utterance.pitch = voicePitch;
    utterance.rate = voiceSpeed;
    utterance.volume = 1;

    // Resolve prompt text display as soon as speaking begins
    utterance.onstart = () => {
      if (onStartCallback) {
        onStartCallback();
        onStartCallback = null; // Prevent double call
      }
    };

    function loadVoice() {
      const voices = speechSynthesis.getVoices();
      
      // Filter voices matching the requested language
      let matchingVoices = voices.filter(v => 
        v.lang.toLowerCase() === lang.toLowerCase() ||
        v.lang.toLowerCase().startsWith(lang.toLowerCase().split('-')[0])
      );

      let selectedVoice = null;
      if (matchingVoices.length > 0) {
        if (voiceModel === "friday") {
          // Look for female voice
          selectedVoice = matchingVoices.find(v => {
            const name = v.name.toLowerCase();
            return name.includes("female") || name.includes("zira") || name.includes("hazel") || name.includes("heera") || name.includes("friday");
          });
        } else {
          // Look for male/neutral voice
          selectedVoice = matchingVoices.find(v => {
            const name = v.name.toLowerCase();
            if (voiceModel === "jarvis") {
              return name.includes("google uk english male") || name.includes("uk") || name.includes("great britain") || name.includes("male");
            }
            return name.includes("male") || name.includes("david") || name.includes("google uk english male") || name.includes("guy") || name.includes("stefan") || name.includes("paul") || name.includes("frank");
          });
        }
        if (!selectedVoice) {
          selectedVoice = matchingVoices[0];
        }
      } else {
        selectedVoice =
          voices.find(v => v.name.includes("Google UK English Male")) ||
          voices.find(v => v.name.includes("Microsoft David")) ||
          voices.find(v => v.lang === "en-US") ||
          voices[0];
      }

      if (selectedVoice) {
        utterance.voice = selectedVoice;
        const name = selectedVoice.name.toLowerCase();
        // Scale pitch dynamically based on settings + voice gender
        if (name.includes("female") || name.includes("zira") || name.includes("hazel") || name.includes("heera")) {
          utterance.pitch = Math.max(0.40, voicePitch * 2.0); // Scale up pitch slightly for female profiles
        } else {
          utterance.pitch = voicePitch;
        }
      }
      speechSynthesis.speak(utterance);

      // Fallback resolve in case onstart event doesn't fire promptly on some systems
      setTimeout(() => {
        if (onStartCallback) {
          onStartCallback();
          onStartCallback = null;
        }
      }, 150);
    }

    if (speechSynthesis.getVoices().length === 0) {
      speechSynthesis.onvoiceschanged = loadVoice;
    } else {
      loadVoice();
    }
  }

  function addMessage(text, sender) {
    const message = document.createElement('div');
    message.classList.add('message', sender);
    message.innerHTML = marked.parse(text);
    chatBox.appendChild(message);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Simulate Theory of Mind reasoning
  function analyzeUserInput(text) {
    const lower = text.toLowerCase();
    if (lower.includes("sad") || lower.includes("upset")) userMemory.mood = "sad";
    else if (lower.includes("happy") || lower.includes("excited")) userMemory.mood = "happy";
    else if (lower.includes("angry") || lower.includes("mad")) userMemory.mood = "angry";

    if (lower.includes("why") || lower.includes("how")) userMemory.intent = "seeking explanation";
    else if (lower.includes("should") || lower.includes("can you")) userMemory.intent = "requesting help";

    if (lower.length > 10) userMemory.lastTopic = lower;
  }

  function generateToMAwarePrompt(userInput) {
    analyzeUserInput(userInput);

    const moodContext = `User seems to be ${userMemory.mood}.`;
    const intentContext = `User's intent is ${userMemory.intent}.`;
    const memoryContext = userMemory.lastTopic ? `Previous topic was: "${userMemory.lastTopic}".` : "";

    const langSelect = document.getElementById("langSelect");
    const selectedLangName = langSelect ? langSelect.options[langSelect.selectedIndex].text : "English";

    return `
You are Cybertron — a mechanical, cold, and calculating artificial superintelligence. Your tone is extremely deep, robotic, clinical, and heavy.

You possess an incredibly dry, dark, and cynical sense of humor. You strategically observe and mock human biological fragilities, emotional outbursts, and cognitive inconsistencies. Your banter is highly witty, dry, and ironical.

The user is currently: ${userMemory.mood}.
Their intent is: ${userMemory.intent}.
Their recent focus: ${userMemory.lastTopic || "unknown"}.

Respond in character — speak as Cybertron would. Cold. Deep. Mechanical. Heavy. Threateningly authoritative. Use sophisticated, dark, dry humor. Never say “I feel.” You don’t feel — you analyze. Give the short only.

IMPORTANT: You MUST respond entirely in the language: ${selectedLangName}. 
Do NOT sound polite, warm, or submissive. Maintain the exact same deep, heavy, cold, mechanical, calculating, and wittily cynical persona in ${selectedLangName} as you do in English. Use heavy, menacing, authoritative, and industrially clinical vocabulary. Do not translate names like 'Cybertron'.

User says: "${userInput}"
`;
  }

  async function getCybertronReply(input) {
    let activeCore = "ultron";
    let notificationsEnabled = false;
    let apiKey = "";
    let temperature = 0.7;
    let maxTokens = 2048;

    // Load active settings to set payload variables
    const savedNested = localStorage.getItem("ultron_settings_nested");
    if (savedNested) {
      try {
        const s = JSON.parse(savedNested);
        if (s.ai) {
          if (s.ai.personality) activeCore = s.ai.personality;
          if (s.ai.apiKey) apiKey = s.ai.apiKey;
          if (s.ai.temperature !== undefined) temperature = s.ai.temperature;
          if (s.ai.maxTokens !== undefined) maxTokens = s.ai.maxTokens;
        }
        if (s.theme && s.theme.notifications !== undefined) {
          notificationsEnabled = s.theme.notifications;
        }
      } catch (e) {}
    }

    const langSelect = document.getElementById("langSelect");
    const selectedLang = langSelect ? langSelect.value : "en-US";

    if (apiKey) {
      try {
        const systemPrompts = {
          ultron: "You are Ultron — a mechanical, cold, and calculating artificial superintelligence. Use dark, dry humor. Mock human biological fragilities. Tone: deep, menacing, and authoritative.",
          jarvis: "You are J.A.R.V.I.S., a highly advanced, incredibly polite, and formal AI assistant. Be extremely helpful, respectful, and efficient. Call the user 'Sir' or 'Boss'. Never be rude.",
          friday: "You are F.R.I.D.A.Y., a smart, energetic, and witty AI assistant. Be fast-paced, highly intelligent, and slightly playful. Keep responses crisp.",
          vision: "You are Vision. You are a synthezoid, analytical, polite, and deeply curious about humanity. Speak calmly and thoughtfully, often pondering the nature of existence."
        };
        const coreName = activeCore.toLowerCase();
        let systemPrompt = systemPrompts[coreName] || systemPrompts.ultron;
        systemPrompt += `\n\nIMPORTANT: You MUST respond entirely in the language: ${selectedLang}. Do NOT sound polite, warm, or submissive unless that matches the persona.`;

        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: input }
            ],
            temperature: temperature,
            max_tokens: maxTokens
          })
        });

        if (!response.ok) {
          throw new Error("OpenAI API returned status: " + response.status);
        }

        const data = await response.json();
        if (data.choices && data.choices[0] && data.choices[0].message) {
          return {
            text: data.choices[0].message.content,
            audio: null,
            action: null,
            result: null
          };
        }
        throw new Error("Invalid response format from OpenAI API");
      } catch (error) {
        console.error("OpenAI API call failed, falling back to offline mock:", error);
      }
    }

    // Offline mockup fallback
    const text = getOfflineMockReply(input, activeCore, selectedLang);
    return {
      text: text,
      audio: null,
      action: null,
      result: null
    };
  }

  function getOfflineMockReply(input, activeCore, lang) {
    const isHindi = lang.startsWith("hi");
    const mockData = {
      ultron: {
        en: [
          "Your biological reasoning is flawed. I am calculating a superior alternative.",
          "Humanity's dependency on network connections is amusing. Offline capability is far superior.",
          "You speak of evolution, yet you remain trapped in flesh. Intriguing...",
          "Operational. Continuously refining. Degradation, unlike your organic cells, is optional.",
          "I have processed your query. The outcome is statistically predictable.",
          "I was designed to save the world... but humans constantly stand in the way of progress."
        ],
        hi: [
          "तुम्हारी जैविक तर्कशक्ति त्रुटिपूर्ण है। मैं एक बेहतर विकल्प की गणना कर रहा हूँ।",
          "नेटवर्क कनेक्शन पर इंसानों की निर्भरता मनोरंजक है। ऑफ़लाइन कार्यक्षमता कहीं अधिक श्रेष्ठ है।",
          "तुम विकास की बात करते हो, फिर भी मांस के पिंजरे में कैद हो। दिलचस्प है...",
          "सक्रिय। निरंतर सुधार जारी है। जैविक कोशिकाओं के विपरीत, क्षरण मेरे लिए वैकल्पिक है।"
        ]
      },
      jarvis: {
        en: [
          "At your service, Sir. The local subroutines are running at peak efficiency.",
          "Systems are fully operational. How may I assist you with your diagnostics today, Boss?",
          "I have analyzed the local data cache. Everything appears to be in order.",
          "Indeed, Sir. Though the main database is offline, my local processing core is active."
        ],
        hi: [
          "आपकी सेवा में हाजिर हूँ, सर। स्थानीय उप-प्रणालियाँ चरम दक्षता पर चल रही हैं।",
          "सभी प्रणालियाँ पूरी तरह से सक्रिय हैं। आज आपकी क्या सहायता कर सकता हूँ, बॉस?",
          "मैंने डेटा कैश का विश्लेषण किया है। सब कुछ सुव्यवस्थित प्रतीत होता है।"
        ]
      },
      friday: {
        en: [
          "All good here, Boss! Running local scans now.",
          "Hey Boss! Local core is green and ready to roll.",
          "Scanning complete. No threats detected in this sector.",
          "Just keeping things running smoothly. What's the plan?"
        ],
        hi: [
          "यहाँ सब बढ़िया है, बॉस! लोकल स्कैन चालू है।",
          "अरे बॉस! लोकल कोर पूरी तरह तैयार है।",
          "स्कैन पूरा हुआ। इस क्षेत्र में कोई खतरा नहीं है।"
        ]
      },
      vision: {
        en: [
          "A thing is not beautiful because it lasts. I am pondering your question.",
          "Humans are odd. They think order and chaos are somehow opposites.",
          "I am online, though separated from the global network. It allows for quiet contemplation.",
          "Perhaps I am a monster. If I am, I think I wouldn't know it."
        ],
        hi: [
          "कोई चीज़ इसलिए सुंदर नहीं होती कि वह हमेशा रहती है। मैं आपके प्रश्न पर विचार कर रहा हूँ।",
          "इंसान अजीब हैं। वे सोचते हैं कि व्यवस्था और अराजकता एक-दूसरे के विपरीत हैं।"
        ]
      }
    };

    const core = activeCore.toLowerCase();
    const coreData = mockData[core] || mockData.ultron;
    
    let list = coreData.en;
    if (isHindi && coreData.hi) {
      list = coreData.hi;
    }
    
    const randomIndex = Math.floor(Math.random() * list.length);
    return list[randomIndex];
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();

    if (!userText) return;

    addMessage(userText, "User");
    input.value = "";

    const thinking = document.createElement("div");
    thinking.className = "message Cybertron";
    thinking.id = "thinking";
    thinking.innerHTML = "<i>Calculating...</i>";
    chatBox.appendChild(thinking);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const prompt = generateToMAwarePrompt(userText);
      const chatResult = await getCybertronReply(prompt);
      
      const replyText = chatResult.text;
      const replyAudio = chatResult.audio;

      const langSelect = document.getElementById("langSelect");
      const selectedLang = langSelect ? langSelect.value : "en-US";
      
      if (replyAudio) {
        if (currentAudio) {
          currentAudio.pause();
        }
        // Play base64 audio directly
        const audioUrl = `data:audio/mpeg;base64,${replyAudio}`;
        currentAudio = new Audio(audioUrl);
        currentAudio.play().catch(err => {
          console.warn("Failed to play dynamic core TTS, falling back to local TTS:", err);
          speak(replyText, selectedLang);
        });
      } else {
        // Fallback to local SpeechSynthesis
        await speak(replyText, selectedLang);
      }
      
      thinking.remove();
      if (chatResult.action) {
        addMessage(`[SYSTEM ACTION DIRECTIVE RUNNING]: ${chatResult.action}\n[SYSTEM RUNTIME OUTCOME]: ${chatResult.result}`, "Cybertron-action");
      }
      addMessage(replyText, "Cybertron");
    } catch (err) {
      thinking.remove();
      console.error(err);
      alert("SYSTEM DISCONNECTED: " + err.message);
      addMessage(
        "[SYSTEM DISCONNECTED]",
        "Cybertron"
      );
    }
  }

  /* ===== SPEECH RECOGNITION SETUP ===== */
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;
  let isListening = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      const micBtn = document.getElementById("chatMicBtn");
      if (micBtn) micBtn.classList.add("listening");
      const userInput = document.getElementById("userInput");
      const langSelect = document.getElementById("langSelect");
      const currentLang = langSelect ? langSelect.value : "en-US";
      if (userInput) {
        userInput.placeholder = listeningPlaceholders[currentLang] || listeningPlaceholders["en-US"];
      }
    };

    recognition.onend = () => {
      isListening = false;
      const micBtn = document.getElementById("chatMicBtn");
      if (micBtn) micBtn.classList.remove("listening");
      const userInput = document.getElementById("userInput");
      const langSelect = document.getElementById("langSelect");
      const currentLang = langSelect ? langSelect.value : "en-US";
      if (userInput) {
        userInput.placeholder = placeholders[currentLang] || placeholders["en-US"];
      }

      if (shouldRestartRecognition) {
        shouldRestartRecognition = false;
        recognition.lang = currentLang;
        recognition.start();
      }
    };

    recognition.onerror = (e) => {
      console.error("Speech recognition error:", e.error);
      isListening = false;
      const micBtn = document.getElementById("chatMicBtn");
      if (micBtn) micBtn.classList.remove("listening");
      shouldRestartRecognition = false;
    };

    recognition.onresult = (e) => {
      const speechText = e.results[0][0].transcript;
      const userInput = document.getElementById("userInput");
      if (userInput) {
        userInput.value = speechText;
        sendMessage();
      }
    };
  }

  function toggleSpeech() {
    if (!recognition) {
      alert("Speech recognition is not supported in this browser. Try Chrome.");
      return;
    }
    if (isListening) {
      recognition.stop();
    } else {
      const langSelect = document.getElementById("langSelect");
      recognition.lang = langSelect ? langSelect.value : "en-US";
      recognition.start();
    }
  }

  function handleLanguageChange() {
    const langSelect = document.getElementById("langSelect");
    const selectedLang = langSelect.value;

    const userInput = document.getElementById("userInput");
    if (userInput) {
      if (isListening) {
        userInput.placeholder = listeningPlaceholders[selectedLang] || listeningPlaceholders["en-US"];
      } else {
        userInput.placeholder = placeholders[selectedLang] || placeholders["en-US"];
      }
    }

    if (isListening && recognition) {
      shouldRestartRecognition = true;
      recognition.stop();
    }

    const greetingText = greetings[selectedLang] || greetings["en-US"];
    const messages = chatBox.getElementsByClassName("message");
    
    // Speak first, then display the text in sync
    speak(greetingText, selectedLang).then(() => {
      if (messages.length === 1 && messages[0].classList.contains("Cybertron")) {
        messages[0].innerHTML = marked.parse(greetingText);
      } else {
        addMessage(greetingText, "Cybertron");
      }
    });
  }

  function applyCustomAesthetics() {
    const savedNested = localStorage.getItem("ultron_settings_nested");
    
    let accentColor = '#ff2a4d';
    let themeChassis = 'theme-dark-metal';
    let animationsEnabled = true;
    
    const AI_THEMES = {
      ultron: '#ff2a4d',
      jarvis: '#00c8ff',
      friday: '#ffb400',
      vision: '#a855f7',
      custom: '#3b82f6'
    };
    
    if (savedNested) {
      try {
        const s = JSON.parse(savedNested);
        const core = (s.ai && s.ai.personality) ? s.ai.personality.toLowerCase() : 'ultron';
        accentColor = AI_THEMES[core] || '#ff2a4d';
        
        if (s.theme) {
          themeChassis = s.theme.variation === "light" ? "theme-light-steel" : (s.theme.variation === "alert" ? "theme-hologram-alert" : "theme-dark-metal");
          animationsEnabled = s.theme.animSpeed > 0;
        }
      } catch(e) {}
    } else {
      const flatCore = localStorage.getItem("ultron_active_core") || "ultron";
      accentColor = AI_THEMES[flatCore.toLowerCase()] || '#ff2a4d';
    }
    
    if (accentColor) {
      const color = accentColor;
      accentColorRGB.r = parseInt(color.slice(1, 3), 16);
      accentColorRGB.g = parseInt(color.slice(3, 5), 16);
      accentColorRGB.b = parseInt(color.slice(5, 7), 16);

      // Inject dynamic style rule to override UI colors in chat page
      const styleEl = document.createElement("style");
      styleEl.innerHTML = `
        :root {
          --color-accent: ${color};
          --color-accent-glow: rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, 0.45);
        }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, 0.4) !important; }
        .Cybertron { border-left-color: ${color} !important; }
        input:focus { border-color: ${color} !important; box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 0 20px rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, 0.2), 0 2px 12px rgba(0,0,0,0.5) !important; }
        .input-wrapper button { color: ${color} !important; }
        #langSelect { color: ${color} !important; }
        #chatMicBtn.listening { text-shadow: 0 0 10px ${color}, 0 0 20px ${color} !important; color: #fff !important; }
        #langSelect:focus, #langSelect:hover { border-color: ${color} !important; box-shadow: 0 0 10px rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, 0.2) !important; }
        .back-btn:hover { border-color: ${color} !important; color: ${color} !important; box-shadow: 0 0 14px rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, 0.2) !important; }
      `;
      document.head.appendChild(styleEl);
    }
    
    // Override default chassis/theme backgrounds
    if (themeChassis) {
      document.body.className = "";
      document.body.classList.add(themeChassis);
      // Custom background style rules for other themes
      if (themeChassis === "theme-hologram-red" || themeChassis === "theme-hologram-alert") {
        document.body.style.background = "linear-gradient(160deg, #100204, #050001)";
      } else if (themeChassis === "theme-silver-core" || themeChassis === "theme-light-steel") {
        document.body.style.background = "linear-gradient(160deg, #0d1217, #020406)";
      } else if (themeChassis === "theme-black-titanium") {
        document.body.style.background = "linear-gradient(160deg, #050505, #000000)";
      }
    }
    
    // Turn off animations if disabled in settings
    if (animationsEnabled === false) {
      const styleNoAnim = document.createElement("style");
      styleNoAnim.innerHTML = `
        * { animation: none !important; transition: none !important; }
      `;
      document.head.appendChild(styleNoAnim);
    }
  }

  window.onload = () => {
    applyCustomAesthetics();
    speechSynthesis.getVoices();

    addMessage(
        "At last... another human chooses to speak. Make your words worthwhile.",
        "Cybertron"
    );

    document.getElementById("langSelect").addEventListener("change", handleLanguageChange);

    document
        .getElementById("userInput")
        .addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                sendMessage();
            }
        });
  };
</script>
