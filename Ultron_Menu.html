<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ULTRON — THREAT CONTROL SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="marvel-ultron.png" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: #0a0a0a;
  overflow: hidden;
  color: #cfcfcf;
}

/* ===== CINEMATIC ULTRON BACKGROUND ===== */
.bg-ultron {
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(
      rgba(0,0,0,0.65),
      rgba(0,0,0,0.85)
    ),
    url("uitron.jpg"); /* <-- your image file */
  background-size: cover;
  background-position: center;
  filter: grayscale(25%) contrast(1.15);
}


/* ===== CANVAS ===== */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ===== PANEL ===== */
.panel {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 760px;
  transform: translate(-50%, -50%);
  background:
    linear-gradient(145deg, rgba(20,20,20,0.92), rgba(8,8,8,0.96));
  border: 1px solid #555;
  box-shadow:
    inset 0 0 40px rgba(255,255,255,0.05),
    0 0 80px rgba(0,0,0,0.95);
  padding: 40px;
  z-index: 2;
  overflow: hidden; /* CRITICAL */
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      rgba(0,0,0,0.35),
      rgba(0,0,0,0.6)
    ),
    url("https://wallpapers.com/images/hd/the-avengers-age-of-ultron-xljqygpxz0l8sxlv.jpg");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  filter: saturate(1.15) contrast(1.05) brightness(0.85);
  opacity: 1;
  z-index: 0;
}

.panel > * {
  position: relative;
  z-index: 1;
}

.panel::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.06),
    transparent 70%
  );
  pointer-events: none;
  z-index: 2;
}


/* ===== METAL TEXT ===== */
.title {
  font-size: 42px;
  letter-spacing: 6px;
  background: linear-gradient(180deg, #eee, #777);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 12px;
  letter-spacing: 3px;
  margin-top: 6px;
  color: #adadad;
  font-weight: 900;;
  background: linear-gradient(180deg, #eee, #777);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== DIVIDER ===== */
.divider {
  height: 1px;
  margin: 30px 0;
  background: linear-gradient(
    to right,
    transparent,
    #555,
    transparent
  );
}

/* ===== COMMANDS ===== */
.commands {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}

.cmd {
  padding: 18px;
  border: 1px solid #333;
  background: linear-gradient(145deg, #161616, #0e0e0e);
  cursor: pointer;
  letter-spacing: 2px;
  font-size: 13px;
  transition: all 0.25s ease;
  position: relative;
}

.cmd::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.15),
    transparent
  );
  opacity: 0;
  transition: opacity 0.3s;
}

.cmd:hover::before {
  opacity: 1;
}

.cmd:hover {
  border-color: #ff2a3c;
  color: #ff2a3c;
}

/* ===== STATUS ===== */
.status {
  margin-top: 30px;
  font-size: 11px;
  letter-spacing: 2px;
  color: #777;
}
</style>
</head>

<body>

<canvas id="metalField"></canvas>

<div class="panel">
  <div class="title">ULTRON</div>
  <div class="subtitle">THREAT ANALYSIS & CONTROL SYSTEM</div>

  <div class="divider"></div>

  <div class="commands">
    <div class="cmd" onclick="openCmd('Ultron_AiChat.html')">COMMUNICATION INTERFACE</div>
    <div class="cmd" onclick="openCmd('Ultron_ThreatDashboard.html')">THREAT ANALYSIS</div>
    <div class="cmd" onclick="openCmd('Ultron_AiPanel.html')">INTELLIGENCE CORE</div>
    <div class="cmd" onclick="openCmd('index.html')">SYSTEM ROOT</div>
  </div>

  <div class="status" id="status">
    SYSTEM ONLINE · METALLIC CORE STABLE
  </div>
</div>

<script>
/* ===== METALLIC BACKGROUND ANIMATION ===== */
const canvas = document.getElementById("metalField");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const lines = Array.from({ length: 80 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  speed: 0.3 + Math.random() * 0.6,
  len: 40 + Math.random() * 120
}));

function animate() {
  ctx.fillStyle = "rgba(10,10,10,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(180,180,180,0.15)";
  ctx.lineWidth = 1;

  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.len, l.y);
    ctx.stroke();

    l.x += l.speed;
    if (l.x > canvas.width + l.len) {
      l.x = -l.len;
      l.y = Math.random() * canvas.height;
    }
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== STATUS ===== */
const status = document.getElementById("status");
const msgs = [
  "GLOBAL SCAN ACTIVE",
  "HUMAN RESPONSE TIME: SLOW",
  "THREAT INDEX NOMINAL",
  "LOGIC DOMINANCE CONFIRMED"
];

setInterval(() => {
  status.textContent = msgs[Math.floor(Math.random() * msgs.length)];
}, 4000);

function openCmd(t) {
  status.textContent = "EXECUTING COMMAND";
  setTimeout(() => window.open(t, "_blank"), 500);
}

let offset = 50;
setInterval(() => {
  offset += 0.05;
  document.querySelector(".bg-ultron").style.backgroundPosition =
    `${50 + Math.sin(offset) * 2}% ${50 + Math.cos(offset) * 2}%`;
}, 50);

</script>

</body>
</html>
