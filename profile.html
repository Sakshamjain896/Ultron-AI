<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Profile | Intelligence Configuration</title>

    <link rel="icon" href="marvel-cybertron.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

    <!-- Dynamic Metallic Background -->
    <canvas id="backgroundCanvas"></canvas>

    <!-- Floating Metallic Particles -->
    <div id="particleContainer"></div>

    <!-- Theatrical Onboarding Overlay -->
    <div id="theatricalCore" class="core-container">

    <div class="orb-shadow"></div>

    <div class="orb-ring ring1"></div>
    <div class="orb-ring ring2"></div>
    <div class="orb-ring ring3"></div>

    <div class="orb-core">

        <div class="orb-highlight"></div>

        <div class="orb-innerGlow"></div>

        <div class="orb-energy"></div>

    </div>

    <canvas id="orbParticles"></canvas>

</div>

    <!-- Main Container -->
    <main class="profile-page">

        <!-- Left Side -->
        <section class="profile-left">

            <h1 id="aiTitle">

                ULTRON

            </h1>

            <p id="aiSubtitle">

                Autonomous Global Intelligence

            </p>

            <div class="system-status">

                <span class="status-dot"></span>

                SYSTEM ONLINE

            </div>

            <div class="username" id="operatorName">OPERATOR</div>
            <div class="user-role" id="operatorRole">SYSTEM ADMINISTRATOR</div>

        </section>

        <!-- Right Side -->
        <section class="profile-right">
            <h2 class="page-title">INTELLIGENCE CONTROL CORE</h2>
            <p class="page-subtitle">SYSTEM DIRECTIVES & AESTHETIC PROTOCOLS</p>

            <div class="settings-grid">
                <!-- SECTION 1: USER IDENTITY -->
                <div class="settings-card">
                    <div class="card-header">
                        <i class="fas fa-id-badge card-icon"></i>
                        <h3>USER IDENTITY</h3>
                    </div>
                    <div class="form-group">
                        <label for="usernameInput">Operator Designation</label>
                        <input type="text" id="usernameInput" placeholder="Designation" class="cyber-input">
                    </div>
                    <div class="form-group">
                        <label for="emailInput">Vocal ID Email</label>
                        <input type="email" id="emailInput" placeholder="operator@cybertron.core" class="cyber-input">
                    </div>
                    <div class="form-group row-toggle">
                        <label for="twoFAInput">Biometric Two-Factor Sync</label>
                        <label class="switch">
                            <input type="checkbox" id="twoFAInput">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="avatarSelect">Operator Emblem</label>
                        <select id="avatarSelect" class="cyber-select">
                            <option value="marvel-ultron.png">Ultron Emblem</option>
                            <option value="marvel-jarvis.png">JARVIS Core</option>
                            <option value="marvel-friday.png">FRIDAY Core</option>
                            <option value="marvel-vision.png">Vision Core</option>
                        </select>
                    </div>
                </div>

                <!-- SECTION 2: PERSONAL INTELLIGENCE -->
                <div class="settings-card">
                    <div class="card-header">
                        <i class="fas fa-brain card-icon"></i>
                        <h3>PERSONAL INTELLIGENCE</h3>
                    </div>
                    <div class="form-group">
                        <label for="aiSelector">Active Core Engine</label>
                        <select id="aiSelector" class="cyber-select">
                            <option value="ultron">Ultron</option>
                            <option value="jarvis">JARVIS</option>
                            <option value="friday">FRIDAY</option>
                            <option value="vision">Vision</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="themeVariation">Theme Chassis</label>
                        <select id="themeVariation" class="cyber-select">
                            <option value="dark">Titanium Dark</option>
                            <option value="light">Steel Silver Light</option>
                            <option value="alert">Hologram Alert Red</option>
                        </select>
                    </div>
                    <div class="form-group slider-group">
                        <label>
                            <span>Animation Velocity</span>
                            <span id="animSpeedVal" class="slider-badge">1.0x</span>
                        </label>
                        <input type="range" id="animSpeedInput" min="0.25" max="2.0" step="0.25" class="cyber-slider">
                    </div>
                    <div class="form-group row-toggle">
                        <label for="compactModeInput">Compact Core Layout</label>
                        <label class="switch">
                            <input type="checkbox" id="compactModeInput">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-group row-toggle">
                        <label for="crtInput">CRT Scanline Filter</label>
                        <label class="switch">
                            <input type="checkbox" id="crtInput">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- SECTION 3: DEVELOPER PROTOCOLS -->
                <div class="settings-card">
                    <div class="card-header">
                        <i class="fas fa-code-branch card-icon"></i>
                        <h3>DEVELOPER CONTROLS</h3>
                    </div>
                    <div class="form-group slider-group">
                        <label>
                            <span>Response Entropy (Temp)</span>
                            <span id="tempVal" class="slider-badge">0.7</span>
                        </label>
                        <input type="range" id="tempInput" min="0.1" max="1.5" step="0.1" class="cyber-slider">
                    </div>
                    <div class="form-group slider-group">
                        <label>
                            <span>Max Core Allocation (Tokens)</span>
                            <span id="tokensVal" class="slider-badge">2048</span>
                        </label>
                        <input type="range" id="tokensInput" min="512" max="4096" step="256" class="cyber-slider">
                    </div>
                    <div class="form-group">
                        <label for="thinkingModeSelect">Cognitive Speed</label>
                        <select id="thinkingModeSelect" class="cyber-select">
                            <option value="fast">Instant Response</option>
                            <option value="deep">Deep Search</option>
                            <option value="precise">High Precision</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="apiKeyInput">Neural API Overrides</label>
                        <input type="password" id="apiKeyInput" placeholder="sk-proj-..................."
                            class="cyber-input">
                    </div>
                    <div class="form-group row-toggle">
                        <label for="memoryInput">Synaptic Core Memory</label>
                        <label class="switch">
                            <input type="checkbox" id="memoryInput">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- CORE SYSTEM STABILITY -->
            <div class="stability-section">
                <div class="stability-header">
                    <span class="stability-label"><i class="fas fa-shield-alt"></i> core stability status</span>
                    <span class="stability-value" id="stabilityValue">98%</span>
                </div>
                <div class="stability-progress">
                    <div class="stability-fill" id="stabilityFill" style="width: 98%;"></div>
                </div>
            </div>

            <div class="button-group">
                <button id="saveBtn" class="cyber-btn primary-btn">
                    <i class="fas fa-save"></i> COMMIT CONFIGURATION
                </button>
                <button id="resetBtn" class="cyber-btn secondary-btn">
                    <i class="fas fa-undo"></i> PURGE ALL DIRECTIVES
                </button>
            </div>
        </section>

    </main>

    <!-- Bottom System Information -->

    <div class="bottom-bar">

        <div>

            ACTIVE AI :
            <span id="activeAI">

                ULTRON

            </span>

        </div>

        <div>

            VERSION :
            Prototype 2.5

        </div>

        <div>

            STATUS :
            ONLINE

        </div>

    </div>

    <script src="storage.js"></script>
    <script src="settings.js"></script>
    <script src="theme.js"></script>
    <script src="globalThemeLoader.js"></script>
    <script src="profile.js"></script>

</body>

</html>
