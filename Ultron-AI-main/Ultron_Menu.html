<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CYBERTRON — THREAT CONTROL SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="marvel-cybertron.png" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  overflow-y: auto;
  overflow-x: hidden;
  color: #cfcfcf;
}

/* ===== CINEMATIC CYBERTRON BACKGROUND ===== */
.bg-cybertron {
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(
      rgba(0,0,0,0.65),
      rgba(0,0,0,0.85)
    ),
    url("uitron.jpg"); /* <-- your image file */
  background-size: cover;
  background-position: center;
  filter: grayscale(25%) contrast(1.15);
}


/* ===== CANVAS ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  display: block;
}

/* ===== PANEL ===== */
.panel {
  position: relative;
  width: 760px;
  max-width: 100%;
  background:
    linear-gradient(145deg, rgba(20,20,20,0.92), rgba(8,8,8,0.96));
  border: 1px solid #555;
  box-shadow:
    inset 0 0 40px rgba(255,255,255,0.05),
    0 0 80px rgba(0,0,0,0.95);
  padding: 40px;
  z-index: 2;
  overflow: hidden; /* CRITICAL */
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      rgba(0,0,0,0.35),
      rgba(0,0,0,0.6)
    ),
    url("https://wallpapers.com/images/hd/the-avengers-age-of-cybertron-xljqygpxz0l8sxlv.jpg");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  filter: saturate(1.15) contrast(1.05) brightness(0.85);
  opacity: 1;
  z-index: 0;
}

.panel > * {
  position: relative;
  z-index: 1;
}

.panel::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.06),
    transparent 70%
  );
  pointer-events: none;
  z-index: 2;
}


/* ===== METAL TEXT ===== */
.title {
  font-size: 42px;
  letter-spacing: 6px;
  background: linear-gradient(180deg, #eee, #777);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 12px;
  letter-spacing: 3px;
  margin-top: 6px;
  color: #adadad;
  font-weight: 900;;
  background: linear-gradient(180deg, #eee, #777);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== DIVIDER ===== */
.divider {
  height: 1px;
  margin: 30px 0;
  background: linear-gradient(
    to right,
    transparent,
    #555,
    transparent
  );
}

/* ===== COMMANDS ===== */
.commands {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}

.cmd {
  padding: 18px;
  border: 1px solid #333;
  background: linear-gradient(145deg, #161616, #0e0e0e);
  cursor: pointer;
  letter-spacing: 2px;
  font-size: 13px;
  transition: all 0.25s ease;
  position: relative;
}

.cmd::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.15),
    transparent
  );
  opacity: 0;
  transition: opacity 0.3s;
}

.cmd:hover::before {
  opacity: 1;
}

.cmd:hover {
  border-color: #ff2a3c;
  color: #ff2a3c;
}

/* ===== STATUS ===== */
.status {
  margin-top: 30px;
  font-size: 11px;
  letter-spacing: 2px;
  color: #777;
}

/* ===== THREAT ANALYSIS SCAN SYSTEM ===== */
.bg-cybertron {
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(
      rgba(0,0,0,0.65),
      rgba(0,0,0,0.85)
    ),
    url("uitron.jpg");
  background-size: cover;
  background-position: center;
  filter: grayscale(25%) contrast(1.15);
}

.scan-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    var(--color-accent-dim, rgba(255, 42, 77, 0.15)) 50%,
    transparent 100%
  );
  background-size: 100% 200%;
  animation: sweep 3s linear infinite;
  pointer-events: none;
  animation-play-state: paused;
}

@keyframes sweep {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(100vh); }
}

.data-overlay {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 9px;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 2.5px;
  color: var(--color-accent, #ff2a4d);
  opacity: 0.85;
  pointer-events: none;
  text-shadow: 0 0 8px var(--color-accent-glow, rgba(255, 42, 77, 0.45));
}

/* Glitch strobe effects */
@keyframes borderStrobe {
  0%, 100% { border-color: #333; box-shadow: none; }
  50% { border-color: var(--color-accent, #ff2a4d); box-shadow: 0 0 12px var(--color-accent-glow, rgba(255, 42, 77, 0.45)); }
}

@keyframes textJitter {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-1px, 1px); }
  40% { transform: translate(1px, -1px); }
  60% { transform: translate(-1px, -1px); }
  80% { transform: translate(1px, 1px); }
}

body.active-scan .cmd:hover {
  animation: borderStrobe 0.15s infinite alternate, textJitter 0.1s infinite;
}
</style>
<script src="globalThemeLoader.js"></script>
</head>

<body>

<div class="bg-cybertron"></div>
<div class="scan-overlay" id="scanOverlay"></div>
<canvas id="metalField"></canvas>

<div class="panel">
  <div class="data-overlay" id="dataOverlay">ANALYZING THREAT...</div>
  <div class="title">CYBERTRON</div>
  <div class="subtitle">THREAT ANALYSIS & CONTROL SYSTEM</div>

  <div class="divider"></div>

  <div class="commands">
    <div class="cmd" onclick="openCmd('Ultron_AiChat.html')">COMMUNICATION INTERFACE</div>
    <div class="cmd" onclick="openCmd('Ultron_ThreatDashboard.html')">THREAT ANALYSIS</div>
    <div class="cmd" onclick="openCmd('Ultron_Aipanel.html')">INTELLIGENCE CORE</div>
    <div class="cmd" onclick="openCmd('index.html')">SYSTEM ROOT</div>
  </div>

  <div class="status" id="status">
    SYSTEM ONLINE · METALLIC CORE STABLE
  </div>
</div>

<script>
/* ===== METALLIC BACKGROUND ANIMATION ===== */
const canvas = document.getElementById("metalField");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const lines = Array.from({ length: 80 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  speed: 0.3 + Math.random() * 0.6,
  len: 40 + Math.random() * 120
}));

let accentColorRGB = { r: 255, g: 42, b: 77 };
function updateAccentColor() {
  const rootStyle = getComputedStyle(document.documentElement);
  const accent = rootStyle.getPropertyValue('--theme-accent').trim() || rootStyle.getPropertyValue('--color-accent').trim();
  if (accent && accent.startsWith('#')) {
    const r = parseInt(accent.slice(1, 3), 16);
    const g = parseInt(accent.slice(3, 5), 16);
    const b = parseInt(accent.slice(5, 7), 16);
    accentColorRGB = { r, g, b };
  }
}
updateAccentColor();
window.addEventListener("storage", (e) => {
  if (e.key === "ultron_settings_nested" || e.key === "ultron_settings") {
    setTimeout(updateAccentColor, 50);
  }
});
const themeObserver = new MutationObserver(() => {
  updateAccentColor();
});
themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ["class", "style"] });
themeObserver.observe(document.body, { attributes: true, attributeFilter: ["class", "style"] });

function animate() {
  ctx.fillStyle = "rgba(10,10,10,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = `rgba(${accentColorRGB.r}, ${accentColorRGB.g}, ${accentColorRGB.b}, 0.15)`;
  ctx.lineWidth = 1;

  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.len, l.y);
    ctx.stroke();

    l.x += l.speed;
    if (l.x > canvas.width + l.len) {
      l.x = -l.len;
      l.y = Math.random() * canvas.height;
    }
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== STATUS & THREAT SCANNING ACTIVE LAYER ===== */
const status = document.getElementById("status");
const dataOverlay = document.getElementById("dataOverlay");
const scanOverlay = document.getElementById("scanOverlay");

const msgs = [
  "GLOBAL SCAN ACTIVE",
  "HUMAN RESPONSE TIME: SLOW",
  "THREAT INDEX NOMINAL",
  "LOGIC DOMINANCE CONFIRMED"
];

const scanPhrases = [
  "ANALYZING THREAT...",
  "CALCULATING PROBABILITIES...",
  "LOGIC DOMINANCE: 99.8%",
  "SCANNING NODE CHASSIS...",
  "TARGET ENGAGEMENT PROTOCOLS ACTIVE",
  "FIREWALL WEAKNESS SPOTTED...",
  "VIBRANIUM DENSITY CALIBRATED"
];

// Activity detection (idle states)
let idleTimeout;
let isScanning = false;

function triggerActivity() {
  if (!isScanning) {
    isScanning = true;
    document.body.classList.add("active-scan");
    if (scanOverlay) scanOverlay.style.animationPlayState = "running";
  }
  clearTimeout(idleTimeout);
  idleTimeout = setTimeout(() => {
    isScanning = false;
    document.body.classList.remove("active-scan");
    if (scanOverlay) scanOverlay.style.animationPlayState = "paused";
  }, 2000);
}

window.addEventListener("mousemove", triggerActivity);
window.addEventListener("keydown", triggerActivity);

setInterval(() => {
  status.textContent = msgs[Math.floor(Math.random() * msgs.length)];
}, 4000);

setInterval(() => {
  if (isScanning && dataOverlay) {
    dataOverlay.textContent = scanPhrases[Math.floor(Math.random() * scanPhrases.length)];
  }
}, 800);

function openCmd(t) {
  status.textContent = "EXECUTING COMMAND";
  setTimeout(() => window.open(t, "_blank"), 500);
}

let offset = 50;
setInterval(() => {
  if (isScanning) {
    offset += 0.05;
    const bg = document.querySelector(".bg-cybertron");
    if (bg) {
      bg.style.backgroundPosition =
        `${50 + Math.sin(offset) * 2}% ${50 + Math.cos(offset) * 2}%`;
    }
  }
}, 50);

</script>

</body>
</html>
